services:
  core:
    build: ./core
    ports:
      - "9119:9119"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AGENTIFIED_PORT=9119
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9119/health"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s
