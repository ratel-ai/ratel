name: Verify install

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to verify (e.g. 0.1.4-rc.2 or 0.1.4)
        required: true
      tag:
        description: npm dist-tag (rc or latest)
        required: true
        default: rc
  schedule:
    # Daily at 09:00 UTC against whatever is on `latest`.
    - cron: '0 9 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version || 'cron' }}
  cancel-in-progress: false

jobs:
  verify:
    name: verify (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: darwin-arm64
            runs-on: macos-14
            node_arch: arm64
          # darwin-x64 runs under Rosetta on Apple Silicon: x64 Node is
          # downloaded by setup-node, all child processes inherit x64,
          # npm installs @ratel-ai/sdk-darwin-x64, the binding loads via
          # Rosetta. Avoids the long macos-13 (Intel) runner queue.
          - label: darwin-x64
            runs-on: macos-14
            node_arch: x64
          - label: linux-x64-gnu
            runs-on: ubuntu-latest
            node_arch: x64
          - label: linux-arm64-gnu
            runs-on: ubuntu-24.04-arm
            node_arch: arm64
          - label: win32-x64-msvc
            runs-on: windows-latest
            node_arch: x64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          architecture: ${{ matrix.node_arch }}
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -e
          if [ -n "${{ inputs.version }}" ]; then
            echo "spec=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "spec=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Install + run @ratel-ai/cli
        shell: bash
        run: |
          set -e
          npx -y "@ratel-ai/cli@${{ steps.ver.outputs.spec }}" --help
      - name: Smoke-test SDK native binding load
        shell: bash
        run: |
          set -e
          tmp=$(mktemp -d)
          cd "$tmp"
          npm init -y >/dev/null
          npm install --no-audit --no-fund "@ratel-ai/sdk@${{ steps.ver.outputs.spec }}"
          node -e "const {ToolRegistry} = require('@ratel-ai/sdk'); const r = new ToolRegistry(); r.register({id:'x',name:'x',description:'x',inputSchema:{},outputSchema:{}}); const hits = r.search('x', 5); if (!Array.isArray(hits) || hits.length === 0) { console.error('search failed'); process.exit(1); } console.log('OK', hits);"

  verify-pypi:
    name: verify-pypi (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: darwin-arm64
            runs-on: macos-14
            python_arch: arm64
          # darwin-x64 runs under Rosetta on Apple Silicon (same trick as the npm
          # `verify` job): setup-python fetches an x64 interpreter, so pip installs
          # the x86_64-apple-darwin wheel and loads it via Rosetta. Avoids the long
          # macos-13 (Intel) runner queue while still smoke-testing the x64 wheel.
          - label: darwin-x64
            runs-on: macos-14
            python_arch: x64
          - label: linux-x64-gnu
            runs-on: ubuntu-latest
            python_arch: x64
          - label: linux-arm64-gnu
            runs-on: ubuntu-24.04-arm
            python_arch: arm64
          - label: win32-x64-msvc
            runs-on: windows-latest
            python_arch: x64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python_arch }}
      - name: Resolve spec
        id: ver
        shell: bash
        run: |
          set -e
          if [ -n "${{ inputs.version }}" ]; then
            echo "spec===${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "spec=" >> "$GITHUB_OUTPUT"
          fi
      - name: Install + smoke-test the wheel
        shell: bash
        run: |
          set -e
          python -m pip install --upgrade pip
          python -m pip install "ratel-ai${{ steps.ver.outputs.spec }}"
          python -c "from ratel_ai import ToolRegistry; r = ToolRegistry(); r.register('x','x','x',{},{}); hits = r.search('x', 5); assert hits and hits[0].tool_id == 'x', hits; print('OK', hits[0].tool_id, hits[0].score)"
