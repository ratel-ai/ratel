name: Verify install

# Per-unit install smoke tests (ADR-0008). Each release unit — core (crate),
# sdk-ts (npm), sdk-py (PyPI), the framework adapters vercel-ai-sdk + mastra (npm),
# and the four telemetry units (telemetry-core on crates.io, telemetry-ts +
# telemetry-ts-otlp on npm, telemetry-py on PyPI) — is verified from its public
# registry with no repo checkout and no local toolchain state, so a broken publish
# surfaces here.
#
# workflow_dispatch: pick a `unit` and (optionally) a `version` to verify just
# that one. The daily cron runs `unit: all` at each unit's `latest`.

on:
  workflow_dispatch:
    inputs:
      unit:
        description: Release unit to verify
        type: choice
        default: all
        options: [all, core, sdk-ts, sdk-py, telemetry-core, telemetry-ts, telemetry-py, telemetry-ts-otlp, vercel-ai-sdk, mastra]
      version:
        description: Version to verify (e.g. 0.2.0-rc.2 or 0.2.0). Only applied when a single unit is selected; ignored for `all`.
        required: false
      tag:
        description: npm dist-tag to fall back to when no version is given (rc or latest)
        required: false
        default: rc
  schedule:
    # Daily at 09:00 UTC against whatever each unit has on `latest`.
    - cron: '0 9 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ inputs.unit || 'cron' }}-${{ inputs.version || 'latest' }}
  cancel-in-progress: false

jobs:
  verify-sdk-ts:
    name: verify sdk-ts (${{ matrix.label }})
    # Runs for `sdk-ts`, `all`, or the cron (schedule has no inputs).
    if: github.event_name == 'schedule' || inputs.unit == 'all' || inputs.unit == 'sdk-ts'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: darwin-arm64
            runs-on: macos-14
            node_arch: arm64
          # darwin-x64 runs under Rosetta on Apple Silicon: x64 Node is
          # downloaded by setup-node, all child processes inherit x64,
          # npm installs @ratel-ai/sdk-darwin-x64, the binding loads via
          # Rosetta. Avoids the long macos-13 (Intel) runner queue.
          - label: darwin-x64
            runs-on: macos-14
            node_arch: x64
          - label: linux-x64-gnu
            runs-on: ubuntu-latest
            node_arch: x64
          - label: linux-arm64-gnu
            runs-on: ubuntu-24.04-arm
            node_arch: arm64
          - label: win32-x64-msvc
            runs-on: windows-latest
            node_arch: x64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          architecture: ${{ matrix.node_arch }}
      - name: Resolve version
        id: ver
        shell: bash
        # A pinned version only applies when sdk-ts is the single selected unit;
        # otherwise fall back to the dist-tag (rc/latest), defaulting to latest.
        run: |
          set -e
          if [ "${{ inputs.unit }}" = "sdk-ts" ] && [ -n "${{ inputs.version }}" ]; then
            echo "spec=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "spec=${{ inputs.tag || 'latest' }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Smoke-test SDK native binding load
        shell: bash
        run: |
          set -e
          tmp=$(mktemp -d)
          cd "$tmp"
          npm init -y >/dev/null
          npm install --no-audit --no-fund "@ratel-ai/sdk@${{ steps.ver.outputs.spec }}"
          node -e "const {ToolRegistry} = require('@ratel-ai/sdk'); const r = new ToolRegistry(); r.register({id:'x',name:'x',description:'x',inputSchema:{},outputSchema:{}}); const hits = r.search('x', 5); if (!Array.isArray(hits) || hits.length === 0) { console.error('search failed'); process.exit(1); } console.log('OK', hits);"

  verify-vercel-ai-sdk:
    name: verify vercel-ai-sdk (npm)
    if: github.event_name == 'schedule' || inputs.unit == 'all' || inputs.unit == 'vercel-ai-sdk'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Resolve version
        id: ver
        shell: bash
        env:
          REQUESTED_UNIT: ${{ inputs.unit }}
          REQUESTED_VERSION: ${{ inputs.version }}
          REQUESTED_TAG: ${{ inputs.tag || 'latest' }}
        # vercel-ai-sdk is GA (0.1.0 on `latest`): the cron verifies `latest`.
        # A caller can pin a version or select the `rc` tag explicitly.
        run: |
          set -euo pipefail
          case "$REQUESTED_TAG" in
            rc|latest) ;;
            *)
              echo "::error::tag must be rc or latest"
              exit 2
              ;;
          esac
          if [ "$REQUESTED_UNIT" = "vercel-ai-sdk" ] && [ -n "$REQUESTED_VERSION" ]; then
            if [[ ! "$REQUESTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
              echo "::error::version must be X.Y.Z or X.Y.Z-rc.N"
              exit 2
            fi
            adapter_spec="$REQUESTED_VERSION"
          else
            adapter_spec="$REQUESTED_TAG"
          fi
          # Pull the SDK from the channel that MATCHES the adapter: a GA adapter
          # peers on a GA SDK, which the `rc` SDK dist-tag would not satisfy →
          # ERESOLVE. An rc adapter pairs with the rc SDK.
          if [[ "$adapter_spec" == "rc" || "$adapter_spec" == *-rc.* ]]; then
            sdk_spec="rc"
          else
            sdk_spec="latest"
          fi
          printf 'adapter_spec=%s\n' "$adapter_spec" >> "$GITHUB_OUTPUT"
          printf 'sdk_spec=%s\n' "$sdk_spec" >> "$GITHUB_OUTPUT"
      - name: Install + smoke-test the published adapter
        shell: bash
        run: |
          set -e
          tmp=$(mktemp -d)
          cd "$tmp"
          npm init -y >/dev/null
          npm install --no-audit --no-fund \
            "@ratel-ai/sdk@${{ steps.ver.outputs.sdk_spec }}" \
            "@ratel-ai/vercel-ai-sdk@${{ steps.ver.outputs.adapter_spec }}" \
            "ai@^7.0.0"
          node --input-type=module <<'EOF'
          import { aiSdk } from "@ratel-ai/vercel-ai-sdk";
          import { ratel } from "@ratel-ai/sdk";
          import { jsonSchema, tool } from "ai";

          const r = ratel().adaptTo(aiSdk());
          await r.tools.register({
            ping: tool({
              description: "Return pong",
              inputSchema: jsonSchema({ type: "object", additionalProperties: false }),
              execute: async () => ({ pong: true }),
            }),
          });

          const tools = r.modelTools();
          for (const id of ["search_capabilities", "invoke_tool", "get_skill_content"]) {
            if (typeof tools[id]?.execute !== "function") {
              throw new Error(`missing executable capability: ${id}`);
            }
          }

          const result = await tools.invoke_tool.execute(
            { toolId: "ping", args: {} },
            { toolCallId: "verify-install", messages: [] },
          );
          if (result?.pong !== true) {
            throw new Error(`unexpected invoke_tool result: ${JSON.stringify(result)}`);
          }
          console.log("OK", result);
          EOF

  verify-mastra:
    name: verify mastra (npm)
    if: github.event_name == 'schedule' || inputs.unit == 'all' || inputs.unit == 'mastra'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Resolve version
        id: ver
        shell: bash
        env:
          REQUESTED_UNIT: ${{ inputs.unit }}
          REQUESTED_VERSION: ${{ inputs.version }}
          REQUESTED_TAG: ${{ inputs.tag || 'latest' }}
        # mastra has a GA on `latest` (unlike vercel-ai-sdk): the cron verifies
        # `latest`. A caller can pin a version or select the `rc` tag explicitly.
        run: |
          set -euo pipefail
          case "$REQUESTED_TAG" in
            rc|latest) ;;
            *)
              echo "::error::tag must be rc or latest"
              exit 2
              ;;
          esac
          if [ "$REQUESTED_UNIT" = "mastra" ] && [ -n "$REQUESTED_VERSION" ]; then
            if [[ ! "$REQUESTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$ ]]; then
              echo "::error::version must be X.Y.Z or X.Y.Z-rc.N"
              exit 2
            fi
            adapter_spec="$REQUESTED_VERSION"
          else
            adapter_spec="$REQUESTED_TAG"
          fi
          # Pull the SDK from the channel that MATCHES the adapter: GA mastra peers
          # on a GA SDK (^0.5.2), which the `rc` SDK dist-tag (an older 0.5.x-rc)
          # would not satisfy → ERESOLVE. An rc adapter pairs with the rc SDK.
          if [[ "$adapter_spec" == "rc" || "$adapter_spec" == *-rc.* ]]; then
            sdk_spec="rc"
          else
            sdk_spec="latest"
          fi
          printf 'adapter_spec=%s\n' "$adapter_spec" >> "$GITHUB_OUTPUT"
          printf 'sdk_spec=%s\n' "$sdk_spec" >> "$GITHUB_OUTPUT"
      - name: Install + smoke-test the published adapter
        shell: bash
        # Installs the adapter against @ratel-ai/sdk plus its @mastra/core peer, then
        # drives ratel().adaptTo(mastra()): the exposed capability tools must be real
        # Mastra tools and invoke_tool must run a registered tool end to end.
        run: |
          set -e
          tmp=$(mktemp -d)
          cd "$tmp"
          npm init -y >/dev/null
          npm install --no-audit --no-fund \
            "@ratel-ai/sdk@${{ steps.ver.outputs.sdk_spec }}" \
            "@ratel-ai/mastra@${{ steps.ver.outputs.adapter_spec }}" \
            "@mastra/core@^1.11.0" \
            "zod@^4.0.0"
          node --input-type=module <<'EOF'
          import { mastra } from "@ratel-ai/mastra";
          import { ratel } from "@ratel-ai/sdk";
          import { createTool } from "@mastra/core/tools";

          const r = ratel().adaptTo(mastra());
          await r.tools.register({
            ping: createTool({
              id: "ping",
              description: "Return pong",
              execute: async () => ({ pong: true }),
            }),
          });

          const tools = r.modelTools();
          for (const id of ["search_capabilities", "invoke_tool", "get_skill_content"]) {
            if (typeof tools[id]?.execute !== "function") {
              throw new Error(`missing executable capability: ${id}`);
            }
          }

          // Mastra tool execute is (input, executionContext); supply the minimal
          // no-op observer the adapter threads through (its "valid minimal context").
          const ctx = {
            observe: {
              async span(_name, fn) {
                return fn();
              },
              log() {},
            },
          };
          const result = await tools.invoke_tool.execute({ toolId: "ping", args: {} }, ctx);
          if (result?.pong !== true) {
            throw new Error(`unexpected invoke_tool result: ${JSON.stringify(result)}`);
          }
          console.log("OK", result);
          EOF

  verify-sdk-py:
    name: verify sdk-py (${{ matrix.label }})
    if: github.event_name == 'schedule' || inputs.unit == 'all' || inputs.unit == 'sdk-py'
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: darwin-arm64
            runs-on: macos-14
            python_arch: arm64
          # darwin-x64 runs under Rosetta on Apple Silicon (same trick as the npm
          # `verify` job): setup-python fetches an x64 interpreter, so pip installs
          # the x86_64-apple-darwin wheel and loads it via Rosetta. Avoids the long
          # macos-13 (Intel) runner queue while still smoke-testing the x64 wheel.
          - label: darwin-x64
            runs-on: macos-14
            python_arch: x64
          - label: linux-x64-gnu
            runs-on: ubuntu-latest
            python_arch: x64
          - label: linux-arm64-gnu
            runs-on: ubuntu-24.04-arm
            python_arch: arm64
          - label: win32-x64-msvc
            runs-on: windows-latest
            python_arch: x64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.python_arch }}
      - name: Resolve spec
        id: ver
        shell: bash
        run: |
          set -e
          if [ "${{ inputs.unit }}" = "sdk-py" ] && [ -n "${{ inputs.version }}" ]; then
            echo "spec===${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "spec=" >> "$GITHUB_OUTPUT"
          fi
      - name: Install + smoke-test the wheel
        shell: bash
        run: |
          set -e
          python -m pip install --upgrade pip
          python -m pip install "ratel-ai${{ steps.ver.outputs.spec }}"
          python -c "from ratel_ai import ToolRegistry; r = ToolRegistry(); r.register('x','x','x',{},{}); hits = r.search('x', 5); assert hits and hits[0].tool_id == 'x', hits; print('OK', hits[0].tool_id, hits[0].score)"

  verify-core:
    name: verify core (crate)
    if: github.event_name == 'schedule' || inputs.unit == 'all' || inputs.unit == 'core'
    # The crate is pure Rust source compiled by the consumer (no prebuilt
    # per-OS artifact), so one linux leg that resolves + builds it as a
    # dependency proves downstream installability; no platform matrix needed.
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - name: Resolve spec
        id: ver
        shell: bash
        run: |
          set -e
          if [ "${{ inputs.unit }}" = "core" ] && [ -n "${{ inputs.version }}" ]; then
            echo "spec=@${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "spec=" >> "$GITHUB_OUTPUT"
          fi
      - name: Add + build the published crate
        shell: bash
        run: |
          set -e
          tmp=$(mktemp -d)
          cd "$tmp"
          cargo init --name ratel_verify --bin -q
          cargo add "ratel-ai-core${{ steps.ver.outputs.spec }}"
          # Reference a public type so the published crate must resolve, download,
          # and link for a downstream consumer — the crate analogue of the npm
          # loader / PyPI wheel smoke tests. (The SDK jobs exercise search behavior.)
          cat > src/main.rs <<'EOF'
          fn main() {
              println!("{}", std::any::type_name::<ratel_ai_core::ToolRegistry>());
          }
          EOF
          cargo run -q

  # The telemetry units are independent single-registry units, each with its own
  # verify leg. Each is pure-language (no per-OS artifact), so one linux leg proves
  # downstream installability. The vocabulary units' smoke test reads SEMCONV_VERSION;
  # the exporter (telemetry-ts-otlp) imports init().
  verify-telemetry-ts:
    name: verify telemetry-ts (npm)
    if: github.event_name == 'schedule' || inputs.unit == 'all' || inputs.unit == 'telemetry-ts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -e
          if [ "${{ inputs.unit }}" = "telemetry-ts" ] && [ -n "${{ inputs.version }}" ]; then
            echo "spec=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "spec=${{ inputs.tag || 'latest' }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Install + smoke-test the package
        shell: bash
        run: |
          set -e
          tmp=$(mktemp -d)
          cd "$tmp"
          npm init -y >/dev/null
          npm install --no-audit --no-fund "@ratel-ai/telemetry@${{ steps.ver.outputs.spec }}"
          node --input-type=module -e "import { SEMCONV_VERSION } from '@ratel-ai/telemetry'; if (SEMCONV_VERSION !== '1.42.0') { console.error('unexpected SEMCONV_VERSION', SEMCONV_VERSION); process.exit(1); } console.log('OK', SEMCONV_VERSION);"

  verify-telemetry-py:
    name: verify telemetry-py (PyPI)
    if: github.event_name == 'schedule' || inputs.unit == 'all' || inputs.unit == 'telemetry-py'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Resolve spec
        id: ver
        shell: bash
        run: |
          set -e
          if [ "${{ inputs.unit }}" = "telemetry-py" ] && [ -n "${{ inputs.version }}" ]; then
            echo "spec===${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "spec=" >> "$GITHUB_OUTPUT"
          fi
      - name: Install + smoke-test the wheel
        shell: bash
        run: |
          set -e
          python -m pip install --upgrade pip
          python -m pip install "ratel-ai-telemetry${{ steps.ver.outputs.spec }}"
          python -c "import ratel_ai_telemetry as t; assert t.SEMCONV_VERSION == '1.42.0', t.SEMCONV_VERSION; print('OK', t.SEMCONV_VERSION)"

  verify-telemetry-core:
    name: verify telemetry-core (crate)
    if: github.event_name == 'schedule' || inputs.unit == 'all' || inputs.unit == 'telemetry-core'
    runs-on: ubuntu-latest
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - name: Resolve spec
        id: ver
        shell: bash
        run: |
          set -e
          if [ "${{ inputs.unit }}" = "telemetry-core" ] && [ -n "${{ inputs.version }}" ]; then
            echo "spec=@${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "spec=" >> "$GITHUB_OUTPUT"
          fi
      - name: Add + build the published crate
        shell: bash
        run: |
          set -e
          tmp=$(mktemp -d)
          cd "$tmp"
          cargo init --name ratel_verify --bin -q
          cargo add "ratel-ai-telemetry${{ steps.ver.outputs.spec }}"
          cat > src/main.rs <<'EOF'
          fn main() {
              println!("{}", ratel_ai_telemetry::SEMCONV_VERSION);
          }
          EOF
          cargo run -q

  verify-telemetry-ts-otlp:
    name: verify telemetry-ts-otlp (npm)
    if: github.event_name == 'schedule' || inputs.unit == 'all' || inputs.unit == 'telemetry-ts-otlp'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          set -e
          if [ "${{ inputs.unit }}" = "telemetry-ts-otlp" ] && [ -n "${{ inputs.version }}" ]; then
            echo "spec=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "spec=${{ inputs.tag || 'latest' }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Install + smoke-test the package
        shell: bash
        # Installing the exporter pulls its @ratel-ai/telemetry dependency, so this
        # also proves the cross-package resolution. The smoke test imports init().
        run: |
          set -e
          tmp=$(mktemp -d)
          cd "$tmp"
          npm init -y >/dev/null
          npm install --no-audit --no-fund "@ratel-ai/telemetry-otlp@${{ steps.ver.outputs.spec }}"
          node --input-type=module -e "import { init } from '@ratel-ai/telemetry-otlp'; if (typeof init !== 'function') { console.error('init is not a function', typeof init); process.exit(1); } console.log('OK', typeof init);"
