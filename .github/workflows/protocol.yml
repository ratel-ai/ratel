name: Protocol

# Runs the catalog-source contract's conformance vectors: recomputes every frozen ETag and
# re-checks the If-None-Match / scope-overlay outcomes against the committed expectations, so
# a drift in the wire contract or the vectors fails CI. Node stdlib only, no install.

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'protocol/**'
      - '.github/workflows/protocol.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Verify v1 conformance vectors
        run: node protocol/v1/conformance/verify.mjs
