name: Publish

on:
  push:
    branches: [main]
    tags: ["core-v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # ── npm (trusted publishing — no NPM_TOKEN) ──────────────────────────
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    defaults:
      run:
        working-directory: src/ts-packages

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: src/ts-packages/pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # Replaced changesets/action — it can't resolve nested workspaces.
      # See https://github.com/changesets/action/issues/265
      - name: Check for pending changesets
        id: changesets-check
        run: |
          COUNT=$(ls .changeset/*.md 2>/dev/null | grep -cv README.md || true)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Version packages
        if: steps.changesets-check.outputs.count > 0
        run: pnpm changeset version

      - name: Create release PR
        if: steps.changesets-check.outputs.count > 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: version packages"
          BRANCH="changeset-release/main"
          git push origin "HEAD:${BRANCH}" --force
          if ! gh pr list --head "$BRANCH" --state open | grep -q .; then
            gh pr create --head "$BRANCH" --base main \
              --title "chore: version packages" \
              --body "Automated version bump from changesets."
          fi

      - name: Publish to npm
        if: steps.changesets-check.outputs.count == 0
        run: pnpm release
        env:
          NPM_CONFIG_PROVENANCE: true

  # ── PyPI (trusted publishing — no API token) ─────────────────────────
  pypi-build:
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.check.outputs.should-publish }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: check
        name: Check if version already on PyPI
        working-directory: src/py-packages/sdk
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION"
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' "https://pypi.org/pypi/agentified/${VERSION}/json")
          if [ "$STATUS" = "200" ]; then
            echo "Version $VERSION already on PyPI, skipping"
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION not on PyPI, will publish"
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.should-publish == 'true'
        run: pip install --upgrade hatchling build

      - if: steps.check.outputs.should-publish == 'true'
        run: python -m build
        working-directory: src/py-packages/sdk

      - if: steps.check.outputs.should-publish == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: py-dist
          path: src/py-packages/sdk/dist/*

  pypi-publish:
    needs: pypi-build
    if: needs.pypi-build.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentified/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: py-dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  # ── Docker Hub (token auth — no OIDC available) ──────────────────────
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: agentified/agentified-core
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/core-v') }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./src/core
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
