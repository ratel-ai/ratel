name: Publish

on:
  push:
    branches: [main]
    tags: ["core-v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  # ── npm (trusted publishing — no NPM_TOKEN) ──────────────────────────
  npm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

  # ── PyPI (trusted publishing — no API token) ─────────────────────────
  pypi-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install --upgrade hatchling build

      - run: python -m build
        working-directory: py-packages/sdk

      - uses: actions/upload-artifact@v4
        with:
          name: py-dist
          path: py-packages/sdk/dist/*

  pypi-publish:
    needs: pypi-build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentified/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: py-dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  # ── Docker Hub (token auth — no OIDC available) ──────────────────────
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: agentified/agentified-core
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/core-v') }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./core
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
