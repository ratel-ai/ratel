name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (validate but do not publish)
        type: boolean
        default: false
      ref:
        description: Git ref to build (only used with workflow_dispatch)
        required: false
        default: revamp

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-version-check:
    name: Tag/version sync
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      dist_tag: ${{ steps.compute.outputs.dist_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - id: compute
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "push" ]; then
            tag_version="${GITHUB_REF_NAME#v}"
          else
            tag_version=$(node -p "require('./src/sdk/ts/package.json').version")
          fi

          ws_version=$(grep -E '^version' Cargo.toml | head -1 | sed -E 's/version *= *"([^"]+)"/\1/')
          sdk_version=$(node -p "require('./src/sdk/ts/package.json').version")
          cli_version=$(node -p "require('./src/integrations/cli/package.json').version")
          py_version=$(grep -E '^version' src/sdk/python/pyproject.toml | head -1 | sed -E 's/version *= *"([^"]+)"/\1/')

          echo "tag_version=$tag_version"
          echo "workspace=$ws_version sdk=$sdk_version cli=$cli_version py=$py_version"

          fail=0
          for v in "$ws_version" "$sdk_version" "$cli_version"; do
            if [ "$v" != "$tag_version" ]; then
              echo "::error::Version mismatch — expected $tag_version, got $v"
              fail=1
            fi
          done
          # PyPI/PEP 440 normalizes pre-release tags (e.g. `0.1.5-rc.4` -> `0.1.5rc4`),
          # so the version that lands on PyPI differs from the npm/crate string. Accept
          # either the npm-style tag or its PEP 440 form in pyproject.toml.
          py_expected=$(printf '%s' "$tag_version" | sed -E 's/-?rc\.?([0-9]+)/rc\1/')
          if [ "$py_version" != "$tag_version" ] && [ "$py_version" != "$py_expected" ]; then
            echo "::error::Python version mismatch — expected $tag_version (or PEP 440 $py_expected), got $py_version"
            fail=1
          fi
          if [ "$fail" = "1" ]; then exit 1; fi

          if [[ "$tag_version" == *-rc.* ]]; then
            echo "dist_tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"
      - name: Verify CHANGELOGs updated
        shell: bash
        env:
          VERSION: ${{ steps.compute.outputs.version }}
        run: |
          set -e
          fail=0
          for f in \
            src/core/lib/CHANGELOG.md \
            src/sdk/ts/CHANGELOG.md \
            src/sdk/python/CHANGELOG.md \
            src/integrations/cli/CHANGELOG.md; do
            if ! grep -qF "## [${VERSION}]" "$f"; then
              echo "::error file=$f::missing entry for version ${VERSION} — run /changelog before tagging"
              fail=1
            fi
          done
          [ "$fail" = "0" ]

  build:
    name: build (${{ matrix.triple }})
    needs: tag-version-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: darwin-arm64
            target: aarch64-apple-darwin
            runs-on: macos-14
            build: pnpm --filter @ratel-ai/sdk exec napi build --release --platform --target aarch64-apple-darwin --manifest-path native/Cargo.toml --output-dir native --js index.cjs --dts index.d.cts
          - triple: darwin-x64
            target: x86_64-apple-darwin
            runs-on: macos-14
            build: pnpm --filter @ratel-ai/sdk exec napi build --release --platform --target x86_64-apple-darwin --manifest-path native/Cargo.toml --output-dir native --js index.cjs --dts index.d.cts
          - triple: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            build: pnpm --filter @ratel-ai/sdk exec napi build --release --platform --target x86_64-unknown-linux-gnu --manifest-path native/Cargo.toml --output-dir native --js index.cjs --dts index.d.cts
          - triple: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
            # Native ARM64 runner — the dense engine's native deps (ring, esaxx-rs,
            # candle) compile fine on linux natively (see linux-x64) but not under
            # zig cross-compile, so build arm64-linux natively instead of `--use-napi-cross`.
            runs-on: ubuntu-24.04-arm
            build: pnpm --filter @ratel-ai/sdk exec napi build --release --platform --target aarch64-unknown-linux-gnu --manifest-path native/Cargo.toml --output-dir native --js index.cjs --dts index.d.cts
          - triple: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            build: pnpm --filter @ratel-ai/sdk exec napi build --release --platform --target x86_64-pc-windows-msvc --manifest-path native/Cargo.toml --output-dir native --js index.cjs --dts index.d.cts
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/sdk/ts/native
          key: ${{ matrix.triple }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build native
        run: ${{ matrix.build }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.triple }}
          path: |
            src/sdk/ts/native/ratel-sdk.${{ matrix.triple }}.node
            src/sdk/ts/native/index.cjs
            src/sdk/ts/native/index.d.cts
          if-no-files-found: error

  publish-npm:
    name: Publish npm packages
    needs: [tag-version-check, build]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - name: Verify npm CLI version
        shell: bash
        run: |
          set -e
          npm --version
          # Trusted Publishers requires npm CLI 11.5.1+
          node -e "const v = require('child_process').execSync('npm --version').toString().trim(); const [maj, min, patch] = v.split('.').map(Number); if (maj < 11 || (maj === 11 && (min < 5 || (min === 5 && patch < 1)))) { console.error('npm CLI ' + v + ' < 11.5.1 (required for Trusted Publishers)'); process.exit(1); } console.log('npm ' + v + ' OK');"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: src/sdk/ts/artifacts
          pattern: bindings-*
          merge-multiple: true
      - name: Distribute binaries into npm/ subpackages
        run: pnpm --filter @ratel-ai/sdk exec napi artifacts --output-dir artifacts --npm-dir npm
      - name: Verify each subpackage has its binary
        shell: bash
        run: |
          set -e
          for triple in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            f="src/sdk/ts/npm/$triple/ratel-sdk.$triple.node"
            test -f "$f" || { echo "missing: $f" >&2; exit 1; }
          done
      - name: Place JS loader + types into native/
        shell: bash
        run: |
          set -e
          cp src/sdk/ts/artifacts/index.cjs src/sdk/ts/native/index.cjs
          cp src/sdk/ts/artifacts/index.d.cts src/sdk/ts/native/index.d.cts
      - name: Build TS loader
        run: pnpm --filter @ratel-ai/sdk run build:ts
      - name: Inject optionalDependencies into SDK loader package.json
        run: node scripts/inject-sdk-optional-deps.mjs
      # Preflight: dry-run every npm publish BEFORE any real push, so a packaging
      # error fails the job before a single (immutable) version goes live. The
      # subpackages → loader → cli order is the install-time dependency order.
      - name: Preflight — dry-run all npm publishes
        shell: bash
        env:
          DIST_TAG: ${{ needs.tag-version-check.outputs.dist_tag }}
        run: |
          set -e
          for triple in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            (cd src/sdk/ts/npm/$triple && npm publish --access public --tag "$DIST_TAG" --dry-run)
          done
          (cd src/sdk/ts && npm publish --access public --tag "$DIST_TAG" --dry-run)
          pnpm --filter @ratel-ai/cli pack --pack-destination "${RUNNER_TEMP}/cli-preflight"
          npm publish "${RUNNER_TEMP}/cli-preflight"/*.tgz --access public --tag "$DIST_TAG" --dry-run
      # Real publishes are idempotent: each skips if that exact name@version is
      # already on the registry, so re-running this job after a partial/transient
      # failure resumes instead of erroring with E409 (npm versions are immutable).
      - name: Publish SDK subpackages
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run && '--dry-run' || '' }}
          DIST_TAG: ${{ needs.tag-version-check.outputs.dist_tag }}
        run: |
          set -e
          for triple in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            dir="src/sdk/ts/npm/$triple"
            name=$(node -p "require('./$dir/package.json').name")
            ver=$(node -p "require('./$dir/package.json').version")
            if [ -z "$DRY_RUN" ] && [ "$(npm view "$name@$ver" version 2>/dev/null)" = "$ver" ]; then
              echo "::notice::$name@$ver already published — skipping"
              continue
            fi
            (cd "$dir" && npm publish --provenance --access public --tag "$DIST_TAG" $DRY_RUN)
          done
      - name: Publish SDK loader
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run && '--dry-run' || '' }}
          DIST_TAG: ${{ needs.tag-version-check.outputs.dist_tag }}
        run: |
          set -e
          name=$(node -p "require('./src/sdk/ts/package.json').name")
          ver=$(node -p "require('./src/sdk/ts/package.json').version")
          if [ -z "$DRY_RUN" ] && [ "$(npm view "$name@$ver" version 2>/dev/null)" = "$ver" ]; then
            echo "::notice::$name@$ver already published — skipping"
          else
            (cd src/sdk/ts && npm publish --provenance --access public --tag "$DIST_TAG" $DRY_RUN)
          fi
      # cli has `workspace:^` specifiers for its internal SDK dep.
      # `npm publish` doesn't understand that protocol and ships the literal
      # string, breaking installs (EUNSUPPORTEDPROTOCOL on `npm install`).
      # Pack with `pnpm pack` first (rewrites workspace:^ → real semver),
      # then publish the tarball with `npm publish` so OIDC + provenance
      # still work.
      - name: Publish cli
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run && '--dry-run' || '' }}
          DIST_TAG: ${{ needs.tag-version-check.outputs.dist_tag }}
        run: |
          set -e
          name=$(node -p "require('./src/integrations/cli/package.json').name")
          ver=$(node -p "require('./src/integrations/cli/package.json').version")
          if [ -z "$DRY_RUN" ] && [ "$(npm view "$name@$ver" version 2>/dev/null)" = "$ver" ]; then
            echo "::notice::$name@$ver already published — skipping"
          else
            pnpm --filter @ratel-ai/cli pack --pack-destination "${RUNNER_TEMP}/cli"
            npm publish "${RUNNER_TEMP}/cli"/*.tgz --provenance --access public --tag "$DIST_TAG" $DRY_RUN
          fi

  publish-crate:
    name: Publish ratel-ai-core to crates.io
    # crates.io is the least-reversible registry (a version can't be re-published
    # and `cargo yank` doesn't free it), so publish it LAST — only once npm and
    # PyPI have both succeeded. Avoids burning the crate version if an earlier
    # registry fails.
    needs: [tag-version-check, publish-npm, publish-pypi]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      # Preflight: package + verify before the irreversible upload.
      - name: Preflight — cargo publish --dry-run
        run: cargo publish -p ratel-ai-core --dry-run
      - name: Authenticate to crates.io via Trusted Publishing
        uses: rust-lang/crates-io-auth-action@v1
        id: cratesio-auth
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.cratesio-auth.outputs.token }}
          DRY_RUN: ${{ inputs.dry_run && '--dry-run' || '' }}
        run: |
          set -e
          # Idempotent: a re-run after a partial release treats an
          # already-uploaded version as success instead of failing.
          if out=$(cargo publish -p ratel-ai-core $DRY_RUN 2>&1); then
            echo "$out"
          else
            echo "$out"
            echo "$out" | grep -qiE 'already (exists|uploaded)' && {
              echo "::warning::ratel-ai-core for this version is already on crates.io — idempotent skip"
              exit 0
            }
            exit 1
          fi

  build-wheels:
    name: build wheel (${{ matrix.triple }})
    needs: tag-version-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: darwin-arm64
            target: aarch64-apple-darwin
            runs-on: macos-14
            manylinux: ''
          - triple: darwin-x64
            target: x86_64-apple-darwin
            runs-on: macos-14
            manylinux: ''
          - triple: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            manylinux: auto
          - triple: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
            # Native ARM64 runner — see the note in the `build` job: the ML native
            # deps cross-compile cleanly only when built natively, not via zig.
            runs-on: ubuntu-24.04-arm
            manylinux: auto
          - triple: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            manylinux: ''
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: src/sdk/python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist
          sccache: 'true'
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.triple }}
          path: src/sdk/python/dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: build sdist
    needs: tag-version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: src/sdk/python
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: src/sdk/python/dist/*.tar.gz
          if-no-files-found: error

  publish-pypi:
    name: Publish ratel-ai to PyPI
    # Sequenced after npm so a partial multi-registry release fails forward in a
    # fixed order (npm → PyPI → crates) rather than three registries racing
    # independently. `twine check` below + `skip-existing` keep this idempotent.
    needs: [tag-version-check, build-wheels, build-sdist, publish-npm]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      # Trusted Publishing (OIDC) — no PyPI token stored as a secret.
      id-token: write
      contents: read
    steps:
      - name: Download wheels + sdist
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true
      - name: List artifacts
        run: ls -la dist/
      - name: Validate packaging (metadata + README rendering)
        # Mirrors the npm/crate `--dry-run` publishes: exercise the PyPI path on
        # dry runs too, so a broken wheel/sdist or bad metadata fails before a real tag.
        # `packaging>=24.2` is required to understand maturin's `Metadata-Version: 2.4`
        # wheels (PEP 639 `License-File`); the runner's preinstalled system `packaging`
        # is older and otherwise rejects the field as "unrecognized or malformed".
        run: |
          python -m pip install --upgrade twine 'packaging>=24.2'
          twine check dist/*
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # Dry runs upload nothing; gate on the workflow_dispatch flag.
          skip-existing: true
        if: ${{ !inputs.dry_run }}

  github-release:
    name: GitHub Release
    needs: [tag-version-check, publish-npm, publish-crate, publish-pypi]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bindings-*
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.tag-version-check.outputs.version }}
          DIST_TAG: ${{ needs.tag-version-check.outputs.dist_tag }}
        run: |
          set -e
          flags=""
          if [ "$DIST_TAG" = "rc" ]; then flags="--prerelease"; fi
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            $flags \
            artifacts/*.node
