name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (validate but do not publish)
        type: boolean
        default: false
      ref:
        description: Git ref to build (only used with workflow_dispatch)
        required: false
        default: revamp

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag-version-check:
    name: Tag/version sync
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      dist_tag: ${{ steps.compute.outputs.dist_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - id: compute
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "push" ]; then
            tag_version="${GITHUB_REF_NAME#v}"
          else
            tag_version=$(node -p "require('./src/sdk/ts/package.json').version")
          fi

          ws_version=$(grep -E '^version' Cargo.toml | head -1 | sed -E 's/version *= *"([^"]+)"/\1/')
          sdk_version=$(node -p "require('./src/sdk/ts/package.json').version")
          mcp_version=$(node -p "require('./src/integrations/mcp-server/package.json').version")
          cli_version=$(node -p "require('./src/integrations/cli/package.json').version")

          echo "tag_version=$tag_version"
          echo "workspace=$ws_version sdk=$sdk_version mcp=$mcp_version cli=$cli_version"

          fail=0
          for v in "$ws_version" "$sdk_version" "$mcp_version" "$cli_version"; do
            if [ "$v" != "$tag_version" ]; then
              echo "::error::Version mismatch — expected $tag_version, got $v"
              fail=1
            fi
          done
          if [ "$fail" = "1" ]; then exit 1; fi

          if [[ "$tag_version" == *-rc.* ]]; then
            echo "dist_tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"
      - name: Verify CHANGELOGs updated
        shell: bash
        env:
          VERSION: ${{ steps.compute.outputs.version }}
        run: |
          set -e
          fail=0
          for f in \
            src/core/lib/CHANGELOG.md \
            src/sdk/ts/CHANGELOG.md \
            src/integrations/mcp-server/CHANGELOG.md \
            src/integrations/cli/CHANGELOG.md; do
            if ! grep -qF "## [${VERSION}]" "$f"; then
              echo "::error file=$f::missing entry for version ${VERSION} — run /changelog before tagging"
              fail=1
            fi
          done
          [ "$fail" = "0" ]

  build:
    name: build (${{ matrix.triple }})
    needs: tag-version-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: darwin-arm64
            target: aarch64-apple-darwin
            runs-on: macos-14
            build: pnpm --filter @ratel-ai/sdk exec napi build --release --platform --target aarch64-apple-darwin --manifest-path native/Cargo.toml --output-dir native --js index.cjs --dts index.d.cts
          - triple: darwin-x64
            target: x86_64-apple-darwin
            runs-on: macos-14
            build: pnpm --filter @ratel-ai/sdk exec napi build --release --platform --target x86_64-apple-darwin --manifest-path native/Cargo.toml --output-dir native --js index.cjs --dts index.d.cts
          - triple: linux-x64-gnu
            target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-latest
            build: pnpm --filter @ratel-ai/sdk exec napi build --release --platform --target x86_64-unknown-linux-gnu --manifest-path native/Cargo.toml --output-dir native --js index.cjs --dts index.d.cts
          - triple: linux-arm64-gnu
            target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-latest
            build: pnpm --filter @ratel-ai/sdk exec napi build --release --platform --target aarch64-unknown-linux-gnu --use-napi-cross --manifest-path native/Cargo.toml --output-dir native --js index.cjs --dts index.d.cts
          - triple: win32-x64-msvc
            target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            build: pnpm --filter @ratel-ai/sdk exec napi build --release --platform --target x86_64-pc-windows-msvc --manifest-path native/Cargo.toml --output-dir native --js index.cjs --dts index.d.cts
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/sdk/ts/native
          key: ${{ matrix.triple }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build native
        run: ${{ matrix.build }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.triple }}
          path: |
            src/sdk/ts/native/ratel-sdk.${{ matrix.triple }}.node
            src/sdk/ts/native/index.cjs
            src/sdk/ts/native/index.d.cts
          if-no-files-found: error

  publish-npm:
    name: Publish npm packages
    needs: [tag-version-check, build]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - name: Verify npm CLI version
        shell: bash
        run: |
          set -e
          npm --version
          # Trusted Publishers requires npm CLI 11.5.1+
          node -e "const v = require('child_process').execSync('npm --version').toString().trim(); const [maj, min, patch] = v.split('.').map(Number); if (maj < 11 || (maj === 11 && (min < 5 || (min === 5 && patch < 1)))) { console.error('npm CLI ' + v + ' < 11.5.1 (required for Trusted Publishers)'); process.exit(1); } console.log('npm ' + v + ' OK');"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: src/sdk/ts/artifacts
          pattern: bindings-*
          merge-multiple: true
      - name: Distribute binaries into npm/ subpackages
        run: pnpm --filter @ratel-ai/sdk exec napi artifacts --output-dir artifacts --npm-dir npm
      - name: Verify each subpackage has its binary
        shell: bash
        run: |
          set -e
          for triple in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            f="src/sdk/ts/npm/$triple/ratel-sdk.$triple.node"
            test -f "$f" || { echo "missing: $f" >&2; exit 1; }
          done
      - name: Place JS loader + types into native/
        shell: bash
        run: |
          set -e
          cp src/sdk/ts/artifacts/index.cjs src/sdk/ts/native/index.cjs
          cp src/sdk/ts/artifacts/index.d.cts src/sdk/ts/native/index.d.cts
      - name: Build TS loader
        run: pnpm --filter @ratel-ai/sdk run build:ts
      - name: Inject optionalDependencies into SDK loader package.json
        run: node scripts/inject-sdk-optional-deps.mjs
      - name: Publish SDK subpackages
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run && '--dry-run' || '' }}
          DIST_TAG: ${{ needs.tag-version-check.outputs.dist_tag }}
        run: |
          set -e
          for triple in darwin-arm64 darwin-x64 linux-x64-gnu linux-arm64-gnu win32-x64-msvc; do
            (cd src/sdk/ts/npm/$triple && npm publish --provenance --access public --tag "$DIST_TAG" $DRY_RUN)
          done
      - name: Publish SDK loader
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run && '--dry-run' || '' }}
          DIST_TAG: ${{ needs.tag-version-check.outputs.dist_tag }}
        run: |
          set -e
          (cd src/sdk/ts && npm publish --provenance --access public --tag "$DIST_TAG" $DRY_RUN)
      # mcp-server and cli have `workspace:^` specifiers for internal deps.
      # `npm publish` doesn't understand that protocol and ships the literal
      # string, breaking installs (EUNSUPPORTEDPROTOCOL on `npm install`).
      # Pack with `pnpm pack` first (rewrites workspace:^ → real semver),
      # then publish the tarball with `npm publish` so OIDC + provenance
      # still work.
      - name: Publish mcp-server
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run && '--dry-run' || '' }}
          DIST_TAG: ${{ needs.tag-version-check.outputs.dist_tag }}
        run: |
          set -e
          pnpm --filter @ratel-ai/mcp-server pack --pack-destination "${RUNNER_TEMP}/mcp-server"
          npm publish "${RUNNER_TEMP}/mcp-server"/*.tgz --provenance --access public --tag "$DIST_TAG" $DRY_RUN
      - name: Publish cli
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry_run && '--dry-run' || '' }}
          DIST_TAG: ${{ needs.tag-version-check.outputs.dist_tag }}
        run: |
          set -e
          pnpm --filter @ratel-ai/cli pack --pack-destination "${RUNNER_TEMP}/cli"
          npm publish "${RUNNER_TEMP}/cli"/*.tgz --provenance --access public --tag "$DIST_TAG" $DRY_RUN

  publish-crate:
    name: Publish ratel-ai-core to crates.io
    needs: tag-version-check
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Authenticate to crates.io via Trusted Publishing
        uses: rust-lang/crates-io-auth-action@v1
        id: cratesio-auth
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.cratesio-auth.outputs.token }}
          DRY_RUN: ${{ inputs.dry_run && '--dry-run' || '' }}
        run: cargo publish -p ratel-ai-core $DRY_RUN

  github-release:
    name: GitHub Release
    needs: [tag-version-check, publish-npm, publish-crate]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: bindings-*
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.tag-version-check.outputs.version }}
          DIST_TAG: ${{ needs.tag-version-check.outputs.dist_tag }}
        run: |
          set -e
          flags=""
          if [ "$DIST_TAG" = "rc" ]; then flags="--prerelease"; fi
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            $flags \
            artifacts/*.node
