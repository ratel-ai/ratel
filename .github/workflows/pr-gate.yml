name: PR Gate

# Release-readiness gate. Builds the REAL distributables (wheel, npm loader + native
# binding, crate, sdist) from this PR, installs each into a clean environment, and runs
# the cross-SDK end-to-end scenario through every SDK + the CLI — catching packaging /
# binding / cross-SDK-drift breakage before it reaches `main` instead of at release time.
#
# Opt-in to save CI: the heavy jobs only run when a PR carries the `ready-to-merge` label
# (and re-run on every commit while it stays on). The terminal `pr-gate` job is the single
# required check — it FAILS an unlabeled PR (blocking merge) and reflects the pipeline on a
# labeled PR. `rstagi` bypasses via the branch ruleset (scripts/setup-branch-ruleset.sh).
#
# Layout (kept to few check rows): one `verify` job PER PLATFORM does Python + Node + CLI
# build+install+e2e in sequence (platforms run in parallel), and the platform-independent
# packaging checks (sdist+twine, crate dry-run, npm optionalDeps integrity) run once on the
# linux leg. Reduced matrix (linux-x64 + darwin-arm64) on PR commits; full 5-platform on
# every push to main (so each merge is fully validated). workflow_dispatch runs full on demand.

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize, reopened, ready_for_review]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  setup:
    name: setup
    runs-on: ubuntu-latest
    outputs:
      armed: ${{ steps.c.outputs.armed }}
      tier: ${{ steps.c.outputs.tier }}
      matrix: ${{ steps.c.outputs.matrix }}
    steps:
      - id: c
        env:
          HAS_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'ready-to-merge') }}
        run: |
          set -e
          # armed = run the heavy jobs. The ready-to-merge label arms it (opt-in to save CI);
          # pushes to main (and workflow_dispatch) always run the full matrix.
          armed=false
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            armed=true
          elif [ "$HAS_LABEL" = "true" ]; then
            armed=true
          fi
          tier=reduced
          if [ "${{ github.event_name }}" != "pull_request" ]; then tier=full; fi

          FULL='[{"triple":"darwin-arm64","os":"macos-14","target":"aarch64-apple-darwin","arch":"arm64"},{"triple":"darwin-x64","os":"macos-14","target":"x86_64-apple-darwin","arch":"x64"},{"triple":"linux-x64-gnu","os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","arch":"x64"},{"triple":"linux-arm64-gnu","os":"ubuntu-24.04-arm","target":"aarch64-unknown-linux-gnu","arch":"arm64"},{"triple":"win32-x64-msvc","os":"windows-latest","target":"x86_64-pc-windows-msvc","arch":"x64"}]'
          REDUCED='[{"triple":"linux-x64-gnu","os":"ubuntu-latest","target":"x86_64-unknown-linux-gnu","arch":"x64"},{"triple":"darwin-arm64","os":"macos-14","target":"aarch64-apple-darwin","arch":"arm64"}]'

          if [ "$tier" = "full" ]; then m="$FULL"; else m="$REDUCED"; fi
          {
            echo "armed=$armed"
            echo "tier=$tier"
            echo "matrix=$m"
          } >> "$GITHUB_OUTPUT"
          echo "event=${{ github.event_name }} has_label=$HAS_LABEL armed=$armed tier=$tier"

  # One job per platform: build each real distributable and exercise it on this runner.
  verify:
    name: verify (${{ matrix.triple }})
    needs: setup
    if: needs.setup.outputs.armed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.triple }}
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          architecture: ${{ matrix.arch }}
          cache: pnpm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: ${{ matrix.arch }}
      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Python SDK — build wheel, install, e2e
        run: |
          set -e
          python -m pip install --upgrade pip maturin
          ( cd src/sdk/python && maturin build --release --target ${{ matrix.target }} --out dist )
          # The darwin-x64 wheel is x86_64-only, but the macos-14 runner is arm64 —
          # and even setup-python's "x64" interpreter runs as arm64 here (it's
          # universal2), so pip computes arm64 tags and rejects the wheel ("not a
          # supported wheel on this platform"). Install + run the e2e through
          # Rosetta's x86_64 slice of the universal2 framework python so the real
          # shipped x86_64 wheel is genuinely exercised. Every other leg installs
          # natively with the runner's own python (Windows included).
          PY=python
          if [ "${{ matrix.target }}" = "x86_64-apple-darwin" ]; then
            PY="arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.11/bin/python3"
          fi
          $PY -c "import platform; print('e2e interpreter machine:', platform.machine())"
          $PY -m pip install src/sdk/python/dist/*.whl
          $PY e2e/python/run_e2e.py

      - name: Node SDK — build native, pack loader+subpackage, install, e2e
        run: |
          set -e
          triple="${{ matrix.triple }}"
          pnpm --filter @ratel-ai/sdk exec napi build --release --platform --target ${{ matrix.target }} --manifest-path native/Cargo.toml --output-dir native --js index.cjs --dts index.d.cts
          pnpm --filter @ratel-ai/sdk run build:ts
          cp "src/sdk/ts/native/ratel-sdk.$triple.node" "src/sdk/ts/npm/$triple/"
          rm -rf "$RUNNER_TEMP/tgz" && mkdir -p "$RUNNER_TEMP/tgz/loader" "$RUNNER_TEMP/tgz/sub"
          pnpm --filter @ratel-ai/sdk pack --pack-destination "$RUNNER_TEMP/tgz/loader"
          npm pack "./src/sdk/ts/npm/$triple" --pack-destination "$RUNNER_TEMP/tgz/sub"
          work="$(mktemp -d)"; cd "$work"; npm init -y >/dev/null
          npm install --no-audit --no-fund "$RUNNER_TEMP"/tgz/loader/*.tgz "$RUNNER_TEMP"/tgz/sub/*.tgz
          cp "$GITHUB_WORKSPACE/e2e/ts/run_e2e.mjs" ./run_e2e.mjs
          RATEL_E2E_DIR="$GITHUB_WORKSPACE/e2e" node run_e2e.mjs

      - name: CLI — pack against PR-built SDK, install, e2e
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/tgz/cli"
          pnpm --filter @ratel-ai/cli build
          pnpm --filter @ratel-ai/cli pack --pack-destination "$RUNNER_TEMP/tgz/cli"
          work="$(mktemp -d)"; cd "$work"; npm init -y >/dev/null
          # install the CLI plus the locally-built SDK loader+subpackage (from the Node step)
          # so the CLI's @ratel-ai/sdk dep resolves to the PR build, not the registry.
          npm install --no-audit --no-fund \
            "$RUNNER_TEMP"/tgz/cli/*.tgz \
            "$RUNNER_TEMP"/tgz/loader/*.tgz \
            "$RUNNER_TEMP"/tgz/sub/*.tgz
          RATEL_BIN="$work/node_modules/.bin/ratel" bash "$GITHUB_WORKSPACE/e2e/cli/run_e2e.sh"

      # Platform-independent packaging integrity — folded into the gate's linux leg so
      # it's one fewer check row; runs once (linux-x64 is always in both matrices).
      - name: Packaging integrity (sdist + twine, crate dry-run, optionalDeps inject)
        if: matrix.triple == 'linux-x64-gnu'
        run: |
          set -e
          # maturin is already installed by the Python SDK step above.
          python -m pip install --upgrade twine 'packaging>=24.2'
          ( cd src/sdk/python && maturin sdist --out dist )
          twine check src/sdk/python/dist/*
          cargo publish -p ratel-ai-core --dry-run
          # Smoke the optionalDeps inject + assert loader/subpackage versions match.
          # NOTE: this rewrites src/sdk/ts/package.json's optionalDependencies in place
          # — harmless here, since it runs after the packs above and the checkout is
          # throwaway. (The CLI's workspace:^ pack rewrite is covered by the CLI step.)
          node scripts/inject-sdk-optional-deps.mjs

  # Single required check.
  pr-gate:
    name: pr-gate
    needs: [setup, verify]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate gate
        run: |
          set -e
          armed="${{ needs.setup.outputs.armed }}"
          echo "event=${{ github.event_name }} armed=$armed tier=${{ needs.setup.outputs.tier }}"

          if [ "${{ github.event_name }}" = "pull_request" ] && [ "$armed" != "true" ]; then
            echo "::error::PR not mergeable: add the 'ready-to-merge' label to run the release gate (artifact build + cross-SDK E2E) before merging."
            exit 1
          fi

          echo "  verify: ${{ needs.verify.result }}"
          if [ "${{ needs.verify.result }}" != "success" ]; then
            echo "::error::PR gate failed — fix the verify job(s) above. (rstagi can bypass to merge anyway; everyone else must get this green.)"
            exit 1
          fi
          echo "PR gate passed: all per-platform verify (build + install + cross-SDK E2E + packaging) green (tier=${{ needs.setup.outputs.tier }})."
