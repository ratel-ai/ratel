name: Markdown links

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".lycheeignore"
      - ".github/workflows/markdown-links.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".lycheeignore"
      - ".github/workflows/markdown-links.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Markdown links
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: >-
            --no-progress
            --max-retries 3
            --retry-wait-time 2
            --root-dir "${{ github.workspace }}"
            .
          fail: true
          failIfEmpty: true
          token: "${{ github.token }}"
