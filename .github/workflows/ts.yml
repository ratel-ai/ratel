name: TS

on:
  push:
    branches: [main, revamp]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/sdk/ts/native
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Lint
        run: pnpm -r lint
      - name: Test
        run: pnpm -r test
      # Example wiring (Vercel AI SDK) — folded in here to keep one TS check row.
      # Drives the real ToolLoopAgent loop with a scripted MockLanguageModel (no API
      # key), catching framework-integration drift the SDK-level tests can't see. The
      # SDK is already built by `pnpm -r build` above, so run the test directly.
      # See examples/ai-sdk/test/agent.test.ts.
      - name: Test the AI SDK example wiring
        run: pnpm --filter @ratel-ai/example-ai-sdk exec tsx test/agent.test.ts
