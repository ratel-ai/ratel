name: TS

on:
  push:
    branches: [main, revamp]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/sdk/ts/native
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Lint
        run: pnpm -r lint
      - name: Test
        run: pnpm -r test
      # Release tooling lives at repo root (outside the pnpm workspace), so run its
      # dependency-free node:test suite here rather than via `pnpm -r test`.
      - name: Test release tooling
        run: node --test scripts/*.test.mjs
      # Example wiring (Vercel AI SDK) — folded in here to keep one TS check row.
      # Drives the real ToolLoopAgent loop with a scripted MockLanguageModel (no API
      # key), catching framework-integration drift the SDK-level tests can't see. The
      # SDK is already built by `pnpm -r build` above, so run the test directly.
      # See examples/ai-sdk/test/agent.test.ts.
      - name: Test the AI SDK example wiring
        run: pnpm --filter @ratel-ai/example-ai-sdk exec tsx test/agent.test.ts
      # Telemetry example — runs offline (console exporter), emitting a ratel.search
      # + execute_tool trace through the OTel SDK, so it verifies the `ratel.*` vocab
      # end-to-end. @ratel-ai/telemetry and @ratel-ai/telemetry-otlp (the example imports
      # init() from the latter) are already built by `pnpm -r build` above.
      # See examples/telemetry-ts/src/index.ts.
      - name: Run the telemetry example
        run: pnpm --filter @ratel-ai/example-telemetry exec tsx src/index.ts

  # AI SDK compatibility matrix — @ratel-ai/vercel-ai-sdk claims `ai@^5 || ^6 || ^7`,
  # so each supported major gets two exact rows (floor + latest verified): build,
  # typecheck, test, then pack the adapter + SDK and typecheck a tarball consumer
  # resolving that exact `ai`. `--no-lockfile` keeps the row substitution out of the
  # lock (the committed dev pin stays the default v7 row); AI_SDK_VERSION keeps the
  # package-layout test's exact-pin assertion honest per row.
  ai-sdk-compat:
    name: ai-sdk compat (ai@${{ matrix.ai-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ai-version: ['5.0.0', '5.0.217', '6.0.0', '6.0.232', '7.0.0', '7.0.33']
    env:
      AI_SDK_VERSION: ${{ matrix.ai-version }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/sdk/ts/native
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Pin the row's exact AI SDK
        run: pnpm --filter @ratel-ai/vercel-ai-sdk add --save-dev --save-exact "ai@${AI_SDK_VERSION}" --no-lockfile
      - name: Build (adapter + workspace deps)
        run: pnpm --filter "@ratel-ai/vercel-ai-sdk..." build
      - name: Typecheck
        run: pnpm --filter @ratel-ai/vercel-ai-sdk typecheck
      - name: Test
        run: pnpm --filter @ratel-ai/vercel-ai-sdk test
      - name: Pack the adapter and the SDK
        run: |
          mkdir -p /tmp/ratel-pack
          pnpm --filter @ratel-ai/sdk exec pnpm pack --pack-destination /tmp/ratel-pack
          pnpm --filter @ratel-ai/vercel-ai-sdk exec pnpm pack --pack-destination /tmp/ratel-pack
      # A consumer install sees only the tarball manifests (peers, exports, d.ts) —
      # no workspace links — so this catches packaging drift the in-repo checks
      # can't: peer ranges rejecting the row's `ai`, missing dist types, exports
      # misrouting. `--omit=optional` skips the SDK's platform-binary optionals
      # (irrelevant to a type-level check and unpublished at workspace versions).
      - name: Typecheck a packed consumer
        run: |
          set -e
          tmp=$(mktemp -d)
          cp /tmp/ratel-pack/*.tgz "$tmp"
          cd "$tmp"
          npm init -y >/dev/null
          npm install --no-audit --no-fund --omit=optional \
            typescript@5 "ai@${AI_SDK_VERSION}" ./ratel-ai-sdk-*.tgz ./ratel-ai-vercel-ai-sdk-*.tgz
          cat > consumer.mts <<'TS'
          import { ratel } from "@ratel-ai/sdk";
          import { aiSdk } from "@ratel-ai/vercel-ai-sdk";
          import { generateText, jsonSchema, tool, type LanguageModel, type ToolSet } from "ai";

          const view = ratel().adaptTo(aiSdk());
          await view.tools.register({
            probe: tool({
              description: "probe tool",
              inputSchema: jsonSchema<{ q: string }>({
                type: "object",
                properties: { q: { type: "string" } },
                required: ["q"],
              }),
              execute: async ({ q }) => ({ q }),
            }),
          });
          const tools: ToolSet = view.modelTools();
          export const run = (model: LanguageModel) =>
            generateText({ model, tools, prompt: "x", prepareStep: view.prepareStep });
          export const appended = view.appendRecall([]);
          TS
          npx tsc --strict --noEmit --skipLibCheck --module nodenext --moduleResolution nodenext --target es2022 consumer.mts
