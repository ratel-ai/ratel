name: TS

on:
  push:
    branches: [main, revamp]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/sdk/ts/native
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm -r build
      - name: Typecheck
        run: pnpm -r typecheck
      - name: Lint
        run: pnpm -r lint
      - name: Test
        run: pnpm -r test

  example:
    # TS analogue of python.yml's `example` job: exercises the SDK wired into the
    # Vercel AI SDK through the real ToolLoopAgent loop, driven by a scripted
    # MockLanguageModel (no API key). Catches framework-integration drift the
    # SDK-level tests can't see. See examples/ai-sdk/test/agent.test.ts.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/sdk/ts/native
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Test the AI SDK wiring
        # `test:integration` builds @ratel-ai/sdk (native + ts) then runs the
        # MockLanguageModel agent test via tsx.
        run: pnpm --filter @ratel-ai/example-ai-sdk test:integration
