name: Python

on:
  push:
    branches: [main, revamp]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/sdk/python
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/sdk/python/native
      - uses: astral-sh/setup-uv@v5
      - name: Create venv + install dev tools
        run: |
          uv venv --python 3.11 .venv
          # opentelemetry-sdk + the local vocabulary let the OTel emission tests
          # (test_telemetry.py, ADR-0007) run rather than skip; both are optional at
          # runtime (base SDK stays dependency-free).
          uv pip install --python .venv maturin pytest pytest-asyncio ruff mypy \
            opentelemetry-sdk -e ../../telemetry/python
      - name: Build native extension
        run: .venv/bin/maturin develop
      - name: Lint
        run: .venv/bin/ruff check .
      - name: Typecheck
        run: .venv/bin/mypy ratel_ai
      - name: Test
        run: .venv/bin/pytest
      # Example wiring (pydantic-ai) — folded in here to keep one Python check row.
      # `main.py` diagnostic mode never invokes a tool, so a model-free `TestModel`
      # run is the only thing that exercises the BM25 top-K -> tool-call path in CI
      # (no API key needed). `uv sync` builds the local ratel-ai wheel (maturin) and
      # installs pydantic-ai + the dev group (pytest, pytest-asyncio).
      - name: Install example (local ratel-ai + pydantic-ai) + test deps
        working-directory: examples/pydantic-ai
        run: uv sync --python 3.11
      - name: Test the example wiring
        working-directory: examples/pydantic-ai
        run: uv run pytest

  # Pure-Python telemetry helper (ADR-0007): no Rust extension, so no maturin —
  # editable install + ruff/mypy/pytest. Separate job because the SDK job's build
  # is maturin-specific to src/sdk/python.
  telemetry:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/telemetry/python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Create venv + install (editable, pure Python)
        run: |
          uv venv --python 3.11 .venv
          uv pip install --python .venv -e '.[dev]'
      - name: Lint
        run: .venv/bin/ruff check .
      - name: Typecheck
        run: .venv/bin/mypy ratel_ai_telemetry
      - name: Test
        run: .venv/bin/pytest
      # Telemetry example — runs offline (console exporter), emitting a ratel.search
      # + execute_tool trace through the OTel SDK, so it verifies the `ratel.*` vocab
      # end-to-end. `uv run` builds the local ratel-ai-telemetry + installs the OTel
      # SDK. See examples/telemetry-python/main.py.
      - name: Run the telemetry example
        working-directory: examples/telemetry-python
        run: uv run --python 3.11 main.py
