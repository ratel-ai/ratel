[package]
name = "ratel-ai-core"
# Prerelease for the dense (semantic) retrieval milestone (ADR-0013). Scoped to
# this crate; the SDK crates stay on the workspace version.
version = "0.3.0-semantic.1"
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
authors.workspace = true
readme = "README.md"
description = "Tool and skill retrieval for AI agents — local dense (semantic) search over catalogs. Core of the Ratel context engineering platform."
keywords = ["mcp", "ai-agents", "tool-calling", "embeddings", "retrieval"]
categories = ["text-processing", "algorithms"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }

# Dense (semantic) retrieval — pure-Rust Candle inference, no C++/ONNX native
# dep, so the SDK wheels/addons stay clean cross-platform. `hf-hub` fetches the
# model on first use into the shared HuggingFace cache (sync `ureq` backend,
# rustls — no OpenSSL/native-tls). See ADR-0013.
candle-core = "0.9"
candle-nn = "0.9"
candle-transformers = "0.9"
tokenizers = { version = "0.21", default-features = false, features = ["onig"] }
hf-hub = { version = "0.5", default-features = false, features = ["ureq"] }

[dev-dependencies]
tempfile = "3"
