[workspace]
resolver = "3"
members = [
    "src/core/lib",
    "src/sdk/ts/native",
    "benchmark/retrieval",
]

[workspace.package]
version = "0.1.5-rc.3"
edition = "2024"
license-file = "LICENSE.md"
repository = "https://github.com/ratel-ai/ratel"
homepage = "https://github.com/ratel-ai/ratel"
documentation = "https://docs.rs/ratel-ai-core"
authors = ["Agentified"]

[workspace.dependencies]
ratel-ai-core = { path = "src/core/lib" }
