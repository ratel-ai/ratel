server {
    listen 5173;

    root /usr/share/nginx/html;
    index index.html;

    location /api {
        proxy_pass http://backend:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        chunked_transfer_encoding on;
        proxy_cache off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
