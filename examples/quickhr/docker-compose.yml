services:
  core:
    image: agentified/agentified-core:0.2.0-beta.1
    ports:
      - "9119:9119"
    env_file: ../../.env
    environment:
      - AGENTIFIED_PORT=9119
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9119/health"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  backend:
    build: ./backend
    ports:
      - "3003:3003"
    env_file: ../../.env
    environment:
      - AGENTIFIED_URL=http://core:9119
      - PORT=3003
    depends_on:
      core:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
